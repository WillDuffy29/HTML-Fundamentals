<!-- Newspaper - Headings and Line Breaks -->
<!-- Introduction to heading hierarchy and line breaks -->
<!-- <h1> is the most important heading - there should only be one per page -->
<!-- <h3> is a subheading - headings should follow a logical order for accessibility -->
<!-- <br> creates a line break within a paragraph without starting a new element -->

<body>
  <h1>BREAKING NEWS!</h1>
  <h3>January 29th 2005</h3>
  <p>PROCTER & GAMBLE made its own contribution to a month of mega-merger<br>
     announcements on Friday when it said it planned to buy Gillette
     in a deal initially valued at $57 billion.</p>
</body>
