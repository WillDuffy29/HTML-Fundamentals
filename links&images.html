<!-- LOST PET -->

<body>
  <h1>HAVE YOU SEEN MY PET BUDDY?</h1>
  <img src="https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg">
  <p>Buddy is a small white cat, approximately 40cm long.<br></p>
  <p>Please call the number <a href="tel:07534042437">HERE</a>. Thanks!</p>
</body>

<!-- Introduction to anchor elements and image embedding -->
<!-- <a> is an anchor element. It can be used to create links to other webpages, or in this case, to a phone number. -->
<!-- <img> is an image element. It requires a 'src' attribute to specify the image source. -->
<!-- <a href="..."> creates a hyperlink - the 'href' attribute defines the destination -->
<!-- href="tel:..." is a special link type that triggers a phone call on mobile devices -->
<!-- <img> is a self-closing element - it does not need a closing tag -->
<!-- 'src' specifies the image source URL -->
