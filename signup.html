<!-- Sign Up Form: Basic Version -->
<!-- This was my introduction to HTML forms -->
<!-- <form> is the container element for all form content -->
<!-- <input> elements collect user data - the 'type' attribute defines what kind of data is expected -->
<!-- type="text" accepts any text, type="email" expects an email format, type="password" hides the input -->
<!-- type="submit" creates a button that submits the form -->

<!DOCTYPE html>
<html>
  <head>
    <title>Sign Up</title>
  </head>
  <body>
    <form>
    <h2>Sign Up</h2>
    Username: <input type="text">
    <br><br>
    Email: <input type="email">
    <br><br>
    Password: <input type="password">
    <br><br>
    Confirm password: <input type="password">
    <br><br>
    <input type="submit">
    </form>
  </body>
</html>
