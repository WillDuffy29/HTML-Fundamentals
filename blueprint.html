<!-- Blueprint - HTML Boilerplate Template -->
<!-- This file documents the standard structure every HTML document should follow -->
<!-- <!DOCTYPE html> tells the browser this is an HTML5 document -->
<!-- <html> is the root element that wraps all page content -->
<!-- <head> contains metadata - information about the page not visible to the user -->
<!-- <title> sets the text displayed on the browser tab -->
<!-- <body> contains all visible page content -->

<!DOCTYPE html>
<html>
  <head>
    <title>Blueprint | This is a blueprint for HTML</title>
  </head>
  <body>
    <p>My code will be inserted here.</p>
  </body>
</html>
