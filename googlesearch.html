<!-- Google Search Form -->
<!-- A simple form exercise recreating a basic search input -->
<!-- 'value' on the submit button changes the button label text -->

<!DOCTYPE html>
<html>
  <head>
    <title>Google</title>
  </head>
  <body>
    <form>
      <p>Search the web using Google!</p>
      <input type="text"><br>
      <input type="submit" value="Google Search">
    </form>
  </body>
</html>
