<!-- Blog Page: Version 1 -->
<!-- This was my introduction to semantic HTML elements -->
<!-- <header> defines the top section of the page, typically containing the site title and navigation -->
<!-- <nav> contains the navigation links. Using semantic elements like this improves accessibility and SEO -->

<!DOCTYPE html>
<html>
  <head>
    <title>Let's Learn Code!</title>
  </head>
  <body>
    <header>
      <h1>Let's Learn to Code!</h1>
      <nav>
        <ul>
          <li><a href="About">About</a></li>
          <li><a href="Stories">Stories</a></li>
        </ul>
      </nav>
    </header>
  </body>
</html>
